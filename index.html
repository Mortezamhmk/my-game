<!DOCTYPE html>
<html lang="fa">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link rel="stylesheet" href="style.css" />
  <title>بازی حدس عدد</title>
</head>

<body>
  <header>
    <h1 class="aylar">🎯 بازی حدس عدد</h1>
    <p class="between">(عددی بین ۱ تا ۲۰)</p>
    <button class="btn again">🔄 شروع دوباره</button>
    <div class="number">?</div>
  </header>

  <main>
    <section class="left">
      <input type="number" class="guess" placeholder="عدد را وارد کنید" />
      <button class="btn check">✅ بررسی</button>
    </section>

    <section class="right">
      <p class="message">شروع به حدس زدن کنید...</p>
      <p class="label-score">💯 امتیاز: <span class="score">20</span></p>
      <p class="label-highscore">
        🥇 بهترین امتیاز: <span class="highscore">0</span>
      </p>
    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
